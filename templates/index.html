<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 科技热点</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.5em;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .nav a {
            padding: 12px 25px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s;
        }
        .nav a:hover, .nav a.active {
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border-color: transparent;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-label {
            color: #888;
            font-size: 0.9em;
        }
        .filter-select {
            padding: 8px 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: #e0e0e0;
            font-size: 0.9em;
            cursor: pointer;
        }
        .filter-select:focus {
            outline: none;
            border-color: #00d2ff;
        }
        .filter-select option {
            background: #24243e;
            color: #e0e0e0;
        }
        .search-box {
            position: relative;
        }
        .search-input {
            padding: 8px 15px 8px 35px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: #e0e0e0;
            font-size: 0.9em;
            width: 250px;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }
        .stats { text-align: center; color: #888; margin-bottom: 25px; }
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .news-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }
        .news-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0,210,255,0.5);
        }
        .card-img {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #1a1a2e, #2d2d5a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            color: rgba(255,255,255,0.2);
            overflow: hidden;
        }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
        .card-tag {
            padding: 3px 10px;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            border-radius: 10px;
            font-size: 0.7em;
        }
        .card-title {
            font-size: 1em;
            color: #fff;
            line-height: 1.4;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: #666;
        }
        .card-hot { color: #ff6b6b; font-weight: bold; }
        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }
        .page-btn {
            padding: 8px 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .page-btn:hover, .page-btn.active {
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border-color: transparent;
        }
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        footer { text-align: center; padding: 40px; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔥 AI 科技热点</h1>
            <div class="nav">
                <a href="/">科技热点</a>
                <a href="/skills">Skills 工具</a>
                <a href="/subscribe">📥 订阅管理</a>
                <a href="/sys">⚙️ 系统管理</a>
            </div>
        </header>
        
        <!-- 控制和筛选区域 -->
        <div class="controls">
            <div class="filter-group">
                <span class="filter-label">排序:</span>
                <select id="sortSelect" class="filter-select">
                    <option value="time_desc">🕐 最新优先</option>
                    <option value="time_asc">🕐 最早优先</option>
                    <option value="hot_desc">🔥 最热优先</option>
                    <option value="hot_asc">🔥 最冷优先</option>
                    <option value="relevance">🎯 相关度优先</option>
                    <option value="comprehensive">⭐ 综合排序</option>
                </select>
                <button class="filter-select" onclick="loadNews()" style="cursor: pointer; background: linear-gradient(90deg, #00d2ff, #3a7bd5); border: none; font-weight: bold;">应用</button>
                
                <span class="filter-label" style="margin-left: 15px;">分类:</span>
                <select id="categorySelect" class="filter-select">
                    <option value="">全部分类</option>
                </select>
                
                <span class="filter-label">新闻源:</span>
                <select id="sourceSelect" class="filter-select">
                    <option value="">全部新闻源</option>
                </select>
                
                <button class="filter-select" onclick="resetFilters()" style="cursor: pointer; margin-left: 5px;">重置</button>
            </div>
            
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input" 
                       placeholder="搜索新闻..." onkeyup="if(event.keyCode===13) loadNews()">
                <button class="filter-select" onclick="loadNews()" style="cursor: pointer; background: linear-gradient(90deg, #00d2ff, #3a7bd5); border: none; font-weight: bold; margin-left: 5px;">搜索</button>
            </div>
        </div>
        
        <div class="stats">
            <span id="statsText">📰 加载中... | 🕐 加载中</span>
        </div>
        
        <div id="newsGrid" class="news-grid">
            <div class="loading">🔄 加载中...</div>
        </div>
        
        <div id="pagination" class="pagination"></div>
        
        <footer>AI 科技热点</footer>
    </div>
    
    <script>
        let currentPage = 1;
        let totalPages = 1;
        
        // 页面加载时初始化
        window.onload = function() {
            loadCategories();
            loadSources();
            loadNews();
        };
        
        // 重置筛选条件
        function resetFilters() {
            document.getElementById('sortSelect').value = 'time_desc';
            document.getElementById('categorySelect').value = '';
            document.getElementById('sourceSelect').value = '';
            document.getElementById('searchInput').value = '';
            currentPage = 1;
            loadNews();
        }
        
        // 加载分类列表
        async function loadCategories() {
            try {
                const res = await fetch('/api/news/categories');
                const data = await res.json();
                const select = document.getElementById('categorySelect');
                if (data.success) {
                    data.data.forEach(cat => {
                        const opt = document.createElement('option');
                        opt.value = cat.name;
                        opt.textContent = `${cat.name} (${cat.count})`;
                        select.appendChild(opt);
                    });
                }
            } catch (e) {
                console.error('加载分类失败:', e);
            }
        }
        
        // 加载新闻源列表
        async function loadSources() {
            try {
                const res = await fetch('/api/news/sources');
                const data = await res.json();
                const select = document.getElementById('sourceSelect');
                if (data.success) {
                    data.data.forEach(src => {
                        const opt = document.createElement('option');
                        opt.value = src.name;
                        opt.textContent = `${src.name} (${src.count})`;
                        select.appendChild(opt);
                    });
                }
            } catch (e) {
                console.error('加载新闻源失败:', e);
            }
        }
        
        // 加载新闻列表
        async function loadNews() {
            // 显示加载状态
            document.getElementById('newsGrid').innerHTML = '<div class="loading">🔄 加载中...</div>';
            
            const sortValue = document.getElementById('sortSelect').value;
            const category = document.getElementById('categorySelect').value;
            const source = document.getElementById('sourceSelect').value;
            const keyword = document.getElementById('searchInput').value;
            
            // 解析排序参数
            let sortBy = 'time';
            let sortOrder = 'desc';
            if (sortValue === 'time_desc') { sortBy = 'time'; sortOrder = 'desc'; }
            else if (sortValue === 'time_asc') { sortBy = 'time'; sortOrder = 'asc'; }
            else if (sortValue === 'hot_desc') { sortBy = 'hot_score'; sortOrder = 'desc'; }
            else if (sortValue === 'hot_asc') { sortBy = 'hot_score'; sortOrder = 'asc'; }
            else if (sortValue === 'relevance') { sortBy = 'relevance'; }
            else if (sortValue === 'comprehensive') { sortBy = 'comprehensive'; }
            
            // 构建 API URL
            let url = `/api/news/search?page=${currentPage}&per_page=20&sort_by=${sortBy}&sort_order=${sortOrder}`;
            if (category) url += `&category=${encodeURIComponent(category)}`;
            if (source) url += `&source=${encodeURIComponent(source)}`;
            if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.success) {
                    renderNews(data.data);
                    renderPagination(data.pagination);
                    updateStats(data);
                } else {
                    document.getElementById('newsGrid').innerHTML = '<div class="loading">❌ 加载失败：' + (data.message || '未知错误') + '</div>';
                }
            } catch (e) {
                console.error('加载新闻失败:', e);
                document.getElementById('newsGrid').innerHTML = '<div class="loading">❌ 加载失败，请检查网络连接</div>';
            }
        }
        
        // 渲染新闻列表
        function renderNews(newsList) {
            const grid = document.getElementById('newsGrid');
            if (newsList.length === 0) {
                grid.innerHTML = '<div class="loading">📭 暂无新闻</div>';
                return;
            }
            
            grid.innerHTML = newsList.map(news => `
                <div class="news-card" onclick="location.href='/news/${news.id}'">
                    <div class="card-img">
                        <img src="${news.image || ''}" alt="" onerror="this.style.display='none'">
                    </div>
                    <div class="card-body">
                        <div class="card-tags">
                            <span class="card-tag">${news.category || '未分类'}</span>
                        </div>
                        <h3 class="card-title">${news.title}</h3>
                        <div class="card-meta">
                            <span>${news.source || '未知'} ${news.author ? '· ' + news.author : ''}</span>
                            <span class="card-hot">🔥 ${news.hot_score || 0}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // 渲染分页
        function renderPagination(pagination) {
            const div = document.getElementById('pagination');
            const { page, total_pages } = pagination;
            currentPage = page;
            totalPages = total_pages;
            
            if (total_pages <= 1) {
                div.innerHTML = '';
                return;
            }
            
            let html = '';
            html += `<button class="page-btn" ${page <= 1 ? 'disabled' : ''} onclick="goToPage(${page - 1})">上一页</button>`;
            
            for (let i = Math.max(1, page - 2); i <= Math.min(total_pages, page + 2); i++) {
                html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            
            html += `<button class="page-btn" ${page >= total_pages ? 'disabled' : ''} onclick="goToPage(${page + 1})">下一页</button>`;
            
            div.innerHTML = html;
        }
        
        // 跳转页码
        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadNews();
        }
        
        // 更新统计信息
        function updateStats(data) {
            const stats = document.getElementById('statsText');
            const total = data.pagination.total;
            const updateTime = data.filters.date_from || new Date().toLocaleDateString('zh-CN');
            stats.textContent = `📰 ${total} 条新闻 | 🕐 ${updateTime}`;
        }
    </script>
</body>
</html>
